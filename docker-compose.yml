version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskdb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskdb
    ports:
      - '5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d taskdb']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - taskapp

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskdb_api
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: taskdb
      JWT_SECRET: supersecretkey123
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taskapp

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskdb_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - '3001:3000'
    depends_on:
      - api
    networks:
      - taskapp

networks:
  taskapp:
    driver: bridge

volumes:
  postgres_data:
